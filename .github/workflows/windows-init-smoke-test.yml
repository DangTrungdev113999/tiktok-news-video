name: Windows

# The previous version of this file ran init.mjs and nothing else, with
# `continue-on-error: true` on every meaningful step. It could not fail. That
# is exactly why two Windows blockers shipped while the repo appeared to have
# Windows CI:
#
#   - render.mjs spawned `npx.cmd` with shell:false -> EINVAL, nothing rendered
#   - clean-source.mjs's `file://${process.argv[1]}` CLI guard is never true on
#     Windows, so it exited 0 having renamed nothing
#
# Neither is subtle. Both were invisible because nothing ran them on Windows
# and asserted. Every step below is allowed to fail the build.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

jobs:
  # Fast checks: pure Node, no ffmpeg, no Chrome. These catch the two blockers.
  cli-and-paths:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Every CLI entry guard works on Windows
        shell: pwsh
        run: |
          # `file://` + argv[1] only forms a valid file URL when the path starts
          # with "/", i.e. on POSIX. Ban the pattern outright -- but only in
          # CODE. clean-source.mjs quotes the bad pattern in a comment
          # explaining why it was wrong, and that comment must not fail CI.
          $bad = Select-String -Path scripts/*.mjs -Pattern 'file://\$\{process\.argv\[1\]\}' |
                 Where-Object { $_.Line.TrimStart() -notmatch '^(//|\*|/\*)' }
          if ($bad) {
            Write-Host "These files build a file URL by hand; use pathToFileURL(process.argv[1]).href:"
            $bad | ForEach-Object { Write-Host "  $($_.Path):$($_.LineNumber)" }
            exit 1
          }
          Write-Host "OK - no hand-built file:// comparisons"

      - name: clean-source actually runs and produces a mapping
        shell: pwsh
        run: |
          $dir = Join-Path $env:RUNNER_TEMP "clean-src-test"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          # Deliberately unsorted and camera-named, to prove numeric ordering too.
          foreach ($n in @("IMG_10.jpg", "IMG_2.jpg", "clip final.MOV")) {
            Set-Content -Path (Join-Path $dir $n) -Value "x"
          }
          # --in-place: this job has no config.local.json, and the default now
          # copies into $WORKSPACE_DIR/assets. The copy behaviour is asserted
          # in the render job, which has run init. Here we only test renaming.
          $out = node scripts/clean-source.mjs $dir --dry-run --in-place 2>&1 | Out-String
          Write-Host $out
          if ($LASTEXITCODE -ne 0) { Write-Host "clean-source exited $LASTEXITCODE"; exit 1 }
          # The silent-failure mode printed NOTHING and exited 0. Assert content.
          if ($out -notmatch "IMG_2\.jpg\s+->\s+anh_1\.jpg") { Write-Host "FAIL: IMG_2 should sort before IMG_10 and become anh_1"; exit 1 }
          if ($out -notmatch "IMG_10\.jpg\s+->\s+anh_2\.jpg") { Write-Host "FAIL: expected IMG_10 -> anh_2"; exit 1 }
          # Lower-cased on purpose by planRenames -- assert the real behaviour,
          # not the input casing.
          if ($out -notmatch "video_1\.mov") { Write-Host "FAIL: expected the .MOV to become video_1.mov"; exit 1 }
          if ($out -notmatch "anh_1_des\.jpg") { Write-Host "FAIL: expected a _des marker copy"; exit 1 }
          Write-Host "OK - clean-source ran, ordered numerically, and planned _des copies"

      - name: A path with a space survives argument passing
        shell: pwsh
        run: |
          # render.mjs must not route args through a shell: `--props=C:\...\a b\spec.json`
          # splits at the space when it does. Prove argv arrives in one piece.
          $dir = Join-Path $env:RUNNER_TEMP "dir with space"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          $probe = Join-Path $env:RUNNER_TEMP "argv-probe.mjs"
          Set-Content -Path $probe -Value 'console.log(process.argv[2]);'
          $target = Join-Path $dir "spec.json"
          $got = node $probe "--props=$target"
          if ($got -ne "--props=$target") { Write-Host "FAIL: got [$got] want [--props=$target]"; exit 1 }
          Write-Host "OK - [$got]"

      - name: Node called by absolute path drags npm along with it
        shell: pwsh
        run: |
          # The employees have no Node. The agent installs it with winget and
          # must then call it by absolute path, because Windows reads PATH once
          # at process start -- the entry winget just wrote does not exist for
          # the next command. This asserts the half that isn't winget's job:
          # given an absolute node, init resolves npm next to it rather than
          # through PATH, so the Remotion install doesn't die right after Node
          # started working.
          #
          # Node is hidden from PATH here to stand in for a machine that never
          # had it. That proves the mechanism, NOT that employees hit this
          # state -- only a real employee machine can show that.
          $nodeExe = (Get-Command node).Source
          # Drop EVERY directory that offers node or npm, not just node's own:
          # the runner also carries an npm shim in a separate prefix directory,
          # which left npm reachable and would have made this test pass without
          # testing anything.
          $env:PATH = ($env:PATH -split ';' | Where-Object {
            $_ -and -not (Test-Path (Join-Path $_ 'node.exe')) -and -not (Test-Path (Join-Path $_ 'npm.cmd'))
          }) -join ';'
          foreach ($c in @('node', 'npm')) {
            if (Get-Command $c -ErrorAction SilentlyContinue) {
              Write-Host "FAIL: $c is still on PATH, this test would pass for the wrong reason"; exit 1
            }
          }
          Write-Host "npm is off PATH; node called absolutely: $nodeExe"

          $got = & $nodeExe -e "import('./scripts/init.mjs').then(m => console.log(m.siblingOfNode('npm.cmd')))"
          Write-Host "siblingOfNode('npm.cmd') -> $got"
          if ($got -notmatch '^[A-Za-z]:\\') { Write-Host "FAIL: expected an absolute path, got [$got]"; exit 1 }
          if (-not (Test-Path $got)) { Write-Host "FAIL: [$got] does not exist"; exit 1 }
          Write-Host "OK - npm resolves next to node, not through PATH"

      - name: init.mjs survives a Windows "Copy as path" (quoted) answer
        shell: pwsh
        run: |
          # Explorer copies paths wrapped in double quotes; `"` is illegal in a
          # filename, so an unstripped quote used to kill init at question one.
          #
          # This asserts BEHAVIOUR -- it calls expandHome and creates a real
          # directory. The first version of this step regex-matched init.mjs's
          # source text instead and false-failed on its first run: the assertion
          # was about how the fix was spelled, not about what it does.
          node .github/scripts/check-expand-home.mjs

  # The employee's actual starting state: a Windows machine with NO Node.js.
  #
  # Deliberately no actions/setup-node here -- that action is what made every
  # other job unable to answer this question. The runner image ships Node at
  # C:\Program Files\nodejs, so the first step hides it and strips PATH, then
  # the agent's documented recovery (winget install -> call node by absolute
  # path) has to bring the machine back from nothing.
  #
  # actions/checkout keeps working through all of this: the runner executes
  # actions with its own bundled Node, not the one on PATH.
  node-bootstrap:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Remove Node.js from this machine
        shell: pwsh
        run: |
          if (Test-Path 'C:\Program Files\nodejs') {
            Rename-Item 'C:\Program Files\nodejs' 'nodejs-hidden-for-test'
          }
          $env:PATH = ($env:PATH -split ';' | Where-Object {
            $_ -and -not (Test-Path (Join-Path $_ 'node.exe')) -and -not (Test-Path (Join-Path $_ 'npm.cmd'))
          }) -join ';'
          # Persist the stripped PATH to the following steps.
          "PATH=$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          foreach ($c in @('node', 'npm')) {
            if (Get-Command $c -ErrorAction SilentlyContinue) {
              Write-Host "FAIL: $c survived; this job cannot simulate a bare machine"; exit 1
            }
          }
          Write-Host "OK - no node, no npm. This is the employee's laptop."

      - name: The agent's recovery -- winget, then an absolute node path
        shell: pwsh
        run: |
          # Exactly what skills/tiktok-news-video-init/SKILL.md tells the agent
          # to run. If this step and that file ever disagree, the file is wrong.
          winget install -e --id OpenJS.NodeJS.LTS --accept-package-agreements --accept-source-agreements --disable-interactivity
          $node = 'C:\Program Files\nodejs\node.exe'
          if (-not (Test-Path $node)) { Write-Host "FAIL: winget did not put node at $node"; exit 1 }

          # The load-bearing claim: `node` alone is STILL broken right after a
          # successful install, because Windows read PATH when this process
          # started. If this ever stops being true, the skill's warning (and
          # half the ffmpeg work) is obsolete and should be revisited.
          if (Get-Command node -ErrorAction SilentlyContinue) {
            Write-Host "NOTE: bare 'node' became visible mid-session -- revisit the PATH guidance"
          } else {
            Write-Host "OK - bare 'node' is still not found; the absolute path is required"
          }
          Write-Host "node version: $(& $node -v)"

      - name: init runs the whole setup from there, unattended
        shell: pwsh
        run: |
          $node = 'C:\Program Files\nodejs\node.exe'

          # First: with stdin closed and NO --workspace, init must REFUSE.
          # This is the whole point of the flag. A tool-invoked Bash call has
          # no keyboard, so the drag-and-drop question reaches nobody -- and
          # silently defaulting there means the folder the admin handed the
          # employee is discarded while init prints a checkmark.
          $null | & $node scripts/init.mjs
          if ($LASTEXITCODE -eq 0) { Write-Host "FAIL: init defaulted the workspace instead of refusing"; exit 1 }
          Write-Host "OK - init refuses to guess the workspace"

          # Now the real path: the agent passes what the employee dragged in.
          $ws = Join-Path $env:RUNNER_TEMP 'ws mau'   # space: the template folder is named by a human
          New-Item -ItemType Directory -Force -Path $ws | Out-Null
          $null | & $node scripts/init.mjs --workspace "$ws"
          if ($LASTEXITCODE -ne 0) { Write-Host "init exited $LASTEXITCODE"; exit 1 }

          $cfg = "$env:USERPROFILE\.tiktok-news-video\config.local.json"
          if (-not (Test-Path $cfg)) { Write-Host "FAIL: init wrote no config"; exit 1 }
          $j = Get-Content $cfg -Raw | ConvertFrom-Json
          if (-not $j.workspaceDir) { Write-Host "FAIL: no workspaceDir in config"; exit 1 }
          if (-not (Test-Path (Join-Path $j.workspaceDir 'assets'))) { Write-Host "FAIL: assets/ was not created"; exit 1 }
          Write-Host "OK - workspace ready at $($j.workspaceDir)"

          # ffmpeg had to come from init too, on a machine that never had it.
          $s = & $node -e "import('./scripts/ffmpeg-path.mjs').then(m => console.log(JSON.stringify(m.status())))"
          Write-Host "ffmpeg: $s"
          if ($s -notmatch '"ok":true') { Write-Host "FAIL: ffmpeg not usable after init"; exit 1 }
          Write-Host "OK - bare machine -> working setup, no human step"

  # The real thing: install Remotion, install ffmpeg, render a video on Windows.
  render:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Deliberately NO `choco install ffmpeg` here. The runner has no ffmpeg,
      # which is exactly the state an employee's laptop is in -- so init has to
      # produce one itself, and the rest of the job proves what it produced is
      # usable IN THE SAME PROCESS, with no PATH reload and no second run.
      #
      # This also replaces the old `npm ci` step: letting init drive the whole
      # install is the path the employee actually takes.
      - name: init installs everything, unattended
        shell: pwsh
        run: |
          # The workspace arrives by flag (that is how the agent hands over
          # what the employee dragged into chat). The API key is left out on
          # purpose: it is optional, so closed stdin must SKIP it, not hang.
          # A hang here means init grew a question with no answer available.
          #
          # Piped, not `< NUL`: PowerShell reserves `<` and errors on it.
          $ws = Join-Path $env:RUNNER_TEMP 'workspace'
          New-Item -ItemType Directory -Force -Path $ws | Out-Null
          $null | node scripts/init.mjs --workspace "$ws"
          if ($LASTEXITCODE -ne 0) { Write-Host "init exited $LASTEXITCODE"; exit 1 }

      - name: ffmpeg + ffprobe resolve WITHOUT a restart
        shell: pwsh
        run: |
          # The whole reason ffmpeg-path.mjs exists: winget/manual installs put
          # ffmpeg on PATH, and PATH is only read at process start -- so the
          # session that just installed it still can't see it. A vendored copy
          # under CONFIG_DIR has no such problem, and this asserts it.
          node -e "import('./scripts/ffmpeg-path.mjs').then(m => { const s = m.status(); console.log(JSON.stringify(s)); if (!s.ok) { console.error('ffmpeg/ffprobe not resolvable right after init'); process.exit(1) } })"

      - name: clean-source copies an employee's folder into the workspace
        shell: pwsh
        run: |
          $cfg = Get-Content "$env:USERPROFILE\.tiktok-news-video\config.local.json" -Raw | ConvertFrom-Json
          $ws = $cfg.workspaceDir
          Write-Host "workspace: $ws"

          # An employee's folder lives wherever they made it. clean-source has
          # to bring it INTO assets/, because buildAssetIndex looks nowhere
          # else -- renaming in place produced a tidy table and then a run that
          # died at Step 1 with "no file in assets/ matches anh_1".
          $src = Join-Path $env:RUNNER_TEMP "Hop bao 12-8"
          New-Item -ItemType Directory -Force -Path $src | Out-Null
          foreach ($n in @("IMG_2.jpg", "IMG_10.jpg")) { Set-Content -Path (Join-Path $src $n) -Value "x" }
          node scripts/clean-source.mjs $src
          if ($LASTEXITCODE -ne 0) { Write-Host "clean-source exited $LASTEXITCODE"; exit 1 }

          $landed = Join-Path $ws "assets\Hop-bao-12-8\anh_1.jpg"
          if (-not (Test-Path $landed)) { Write-Host "FAIL: expected $landed"; exit 1 }
          # COPY, not move: renaming someone's photos is hard to undo.
          if (-not (Test-Path (Join-Path $src "IMG_2.jpg"))) { Write-Host "FAIL: the original folder was modified"; exit 1 }
          Write-Host "OK - copied into $landed, original untouched"

      - name: Full pipeline smoke test (probe -> TTS mock -> build-spec -> render)
        run: node scripts/smoke-test.mjs

      - name: The rendered spec must use forward slashes for audio
        shell: pwsh
        run: |
          # staticFile() is a URL builder: a backslash is a literal character,
          # not a separator, so `output\run\narration.mp3` renders silently
          # without audio. path.relative() on Windows produces exactly that.
          $spec = Get-ChildItem -Recurse -Filter "spec.json" -Path "output" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $spec) { Write-Host "no spec.json produced by the smoke test"; exit 1 }
          $j = Get-Content $spec.FullName -Raw | ConvertFrom-Json
          foreach ($f in @("narrationAudioPath", "bgmAudioPath")) {
            $v = $j.$f
            if ($v -and $v.Contains("\")) { Write-Host "FAIL: $f contains a backslash: $v"; exit 1 }
            if ($v) { Write-Host "OK - $f = $v" }
          }
